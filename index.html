<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Registration Form</h2>

    <table border="0" cellspacing="0" cellpadding="10">
        <tr>
            <td>Full Name</td>
            <td>
                <input type="text">
            </td>
        </tr>
        <tr>
            <td>Email</td>
            <td>
                <input type="text">
            </td>
        </tr>
        <tr>
            <td>Phone Number</td>
            <td>
              <input type="tel">  
            </td>
        </tr>
        <tr>
            <td>Gender</td>
            <td>
                <input type="radio" name="gender" id="" value="male">
                <Label>Male</Label>
                 <input type="radio" name="gender" id="" value="female">
                <Label>Female</Label>
            </td>
        </tr>
        <tr>
            <td>Hobbies</td>
            <td>
                <input type="checkbox" name="hobbies" id="" value="reading">
                <label for="">Reading</label><br>
                 <input type="checkbox" name="hobbies" id="" value="writing">
                <label for="">Writing</label><br>
                 <input type="checkbox" name="hobbies" id="" value="sports">
                <label for="">Sports</label>
        </tr>
        <tr>
            <td>Additional Message</td>
            <td>
                <textarea name="" id="" rows="3" cols="60"></textarea>
                </td>
        </tr>
        <tr>
            <td colspan="2" style="text-align: center;">
                <button>Submit</button>
                <button>Reset</button>
            </td>
        </tr>
    </table>
</body>
</html>
